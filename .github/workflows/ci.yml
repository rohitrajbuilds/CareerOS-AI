name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Check formatting
        run: pnpm exec prettier . --check

      - name: Run linters
        run: pnpm lint:extension

      - name: Run typecheck
        run: pnpm typecheck:extension

      - name: Run unit tests
        run: pnpm test:unit

      - name: Build extension
        run: pnpm build

      - name: Upload extension artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extension-dist
          path: apps/extension/dist

  backend:
    name: Backend Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./apps/backend[dev]"

      - name: Check backend formatting
        run: python -m ruff format --check apps/backend/app apps/backend/tests

      - name: Run backend lint
        run: python -m ruff check apps/backend/app apps/backend/tests

      - name: Run backend tests
        env:
          PYTHONPATH: apps/backend
        run: python -m pytest apps/backend/tests --cov=app --cov-report=term-missing

  e2e:
    name: Extension E2E
    runs-on: ubuntu-latest
    needs:
      - frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build extension
        run: pnpm build

      - name: Run Playwright suite
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
